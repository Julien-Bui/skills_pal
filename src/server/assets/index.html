<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Pal — Registry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-base: #0f1014;
            --bg-surface: #16171d;
            --bg-surface-hover: #1e1f26;
            --border-color: #2a2b36;
            --text-primary: #f8f8f2;
            --text-secondary: #8b949e;
            --accent-orange: #fb8f24;
            --accent-orange-dim: rgba(251, 143, 36, 0.1);
            --accent-green: #2ea043;
            --accent-green-dim: rgba(46, 160, 67, 0.15);
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 240px;
            background-color: var(--bg-base);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            letter-spacing: -0.5px;
        }

        .sidebar-header span {
            color: var(--accent-orange);
        }

        .nav-group {
            margin-bottom: 2rem;
        }

        .nav-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.5rem;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: var(--bg-surface);
            color: var(--text-primary);
        }

        .nav-item.active {
            border-left: 2px solid var(--accent-orange);
            border-radius: 0 6px 6px 0;
        }

        .nav-item-icon {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .badge-count {
            background-color: var(--bg-surface-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-base);
        }

        /* Topbar */
        .topbar {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background-color: var(--bg-base);
            z-index: 10;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-orange);
            background-color: var(--bg-base);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .search-shortcut {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .github-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .github-btn:hover {
            background-color: var(--bg-surface);
        }

        /* Content Area */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .hero h1 span {
            color: var(--accent-orange);
        }

        .hero p {
            color: var(--accent-green);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hero p::before {
            content: '●';
            font-size: 0.8rem;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .toolbar-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toolbar-count {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .filter-btn:hover {
            background-color: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.2rem;
        }

        /* Card */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.2rem;
            display: flex;
            gap: 1rem;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            border-color: var(--accent-orange);
            background-color: var(--bg-surface-hover);
            transform: translateY(-2px);
        }

        .card-icon-wrapper {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background-color: var(--accent-orange-dim);
            border: 1px solid rgba(251, 143, 36, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .tag.green {
            background-color: var(--accent-green-dim);
            border-color: rgba(46, 160, 67, 0.3);
            color: var(--accent-green);
        }

        /* Loading & Empty state */
        .loading,
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                padding: 0 1rem;
            }

            .search-container {
                width: 100%;
                max-width: 300px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span></span> Skills Pal
        </div>

        <div class="nav-group">
            <div class="nav-title">Browse</div>
            <a href="#" class="nav-item active">
                <div class="nav-item-icon">
                    <span></span> Skills
                </div>
                <span class="badge-count" id="nav-skills-count">0</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-item-icon">
                    <span></span> Agents
                </div>
                <span class="badge-count">0</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-item-icon">
                    <span></span> Plugins
                </div>
                <span class="badge-count">0</span>
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-title">Resources</div>
            <a href="https://github.com/Julien-Bui/skills_pal" target="_blank" class="nav-item">
                <div class="nav-item-icon">
                    <span></span> Docs
                </div>
            </a>
            <a href="https://github.com/Julien-Bui/skills_pal" target="_blank" class="nav-item">
                <div class="nav-item-icon">
                    <span></span> GitHub
                </div>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Topbar -->
        <header class="topbar">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search" placeholder="Search components..."
                    autocomplete="off">
                <span class="search-shortcut">⌘ K</span>
            </div>
            <div class="topbar-actions">
                <a href="https://github.com/Julien-Bui/skills_pal" target="_blank" class="github-btn">
                    GitHub
                </a>
            </div>
        </header>

        <!-- Scrollable Area -->
        <div class="scrollable-content">
            <div class="content-container">

                <!-- Hero -->
                <div class="hero">
                    <h1>Skills <span>Registry</span></h1>
                    <p id="server-status">Ready-to-use configurations for Skills Pal projects</p>
                </div>

                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="toolbar-title">
                        <span id="shown-count">0</span> <span class="toolbar-count">components</span>
                    </div>
                    <div class="filters">
                        <button class="filter-btn">
                            All categories <span>▼</span>
                        </button>
                        <button class="filter-btn">
                            Filters
                        </button>
                    </div>
                </div>

                <!-- Grid -->
                <div class="grid" id="grid">
                    <div class="loading">Loading registry data...</div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Use SVG icons or emojis, we use emojis for simplicity but styled inside the orange box
        const ICONS = ['📦', '⚡', '🛡️', '⚙️', '🔨', '🧩', '🚀', '🔬'];
        let allSkills = [];

        async function loadSkills() {
            try {
                const res = await fetch('/api/skills');
                if (!res.ok) throw new Error("API not available");
                allSkills = await res.json();
                
                const count = allSkills.length;
                document.getElementById('nav-skills-count').textContent = count;
                document.getElementById('server-status').innerHTML = '● Ready-to-use configurations for Skills Pal projects';
                document.getElementById('server-status').style.color = 'var(--accent-green)';

                renderSkills(allSkills);
            } catch (e) {
                // Fausse donnée pour pouvoir tester le design sur "Live Server" (VSCode) sans backend
                allSkills = [
                    { name: "Frontend Design", description: "Create distinctive, production-grade frontend interfaces with high design intelligence.", github_url: "#" },
                    { name: "Code Reviewer", description: "Comprehensive code review skill for TypeScript, JavaScript, Python, Swift.", github_url: "#" },
                    { name: "Senior Backend", description: "Comprehensive backend development skill for building scalable backend architecture.", github_url: "#" },
                    { name: "UI UX Pro Max", description: "UI/UX design intelligence. 50 styles, 21 palettes, 50 font pairings.", github_url: "#" },
                    { name: "Senior Architect", description: "Comprehensive software architecture skill for designing scalable, maintainable systems.", github_url: "#" },
                    { name: "Skill Creator", description: "Create new skills, modify and improve existing skills, and measure skill usage.", github_url: "#" }
                ];
                document.getElementById('nav-skills-count').textContent = allSkills.length;
                document.getElementById('server-status').innerHTML = '● Local Mock Mode (VSCode Live Server)';
                document.getElementById('server-status').style.color = 'var(--accent-orange)';
                renderSkills(allSkills);
            }
        }

        function renderSkills(skills) {
            const grid = document.getElementById('grid');
            document.getElementById('shown-count').textContent = skills.length;

            if (skills.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>No components found matching your search.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = skills.map((s, i) => {
                const safeUrl = (s.github_url.startsWith('http://') || s.github_url.startsWith('https://'))
                    ? escapeHtml(s.github_url)
                    : '#';

                // Extract a pseudo-category from the name or default to 'development'
                const category = 'development';

                return `
                <a href="${safeUrl}" target="_blank" rel="noopener" class="card">
                    <div class="card-icon-wrapper">
                        ${ICONS[i % ICONS.length]}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(s.name)}</div>
                        <div class="card-desc">${escapeHtml(s.description)}</div>
                        <div class="card-footer">
                            <span class="tag">${category}</span>
                            <span class="tag green">↓ Install</span>
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Search logic
        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allSkills.filter(s =>
                s.name.toLowerCase().includes(q) ||
                s.description.toLowerCase().includes(q)
            );
            renderSkills(filtered);
        });

        // Keyboard shortcut for search
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });

        loadSkills();
    </script>
</body>

</html>
